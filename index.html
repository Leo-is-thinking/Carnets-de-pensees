<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnets de pensées</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0c09; --paper: #fefcf8; --sepia: #8b6f47;
    --pale: #e8e0d0; --accent: #c4472a; --muted: #9e8e7a;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'DM Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--serif); font-weight: 300; line-height: 1.7; min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(196,71,42,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,111,71,0.06) 0%, transparent 60%);
  }
  header {
    border-bottom: 1px solid var(--pale); padding: 2.5rem 0 0;
    position: sticky; top: 0; background: rgba(254,252,248,0.92);
    backdrop-filter: blur(12px); z-index: 100;
  }
  .header-inner {
    max-width: 960px; margin: 0 auto; padding: 0 2rem 1.5rem;
    display: flex; align-items: baseline; justify-content: space-between; gap: 2rem;
  }
  .site-title {
    font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 300;
    letter-spacing: -0.02em; line-height: 1; cursor: pointer;
  }
  .site-title span { color: var(--accent); font-style: italic; }
  nav a {
    font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); text-decoration: none;
    transition: color 0.2s; cursor: pointer;
  }
  nav a:hover { color: var(--accent); }
  main { max-width: 960px; margin: 0 auto; padding: 3rem 2rem 6rem; }
  .section-label {
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); border-top: 1px solid var(--pale);
    padding-top: 1.5rem; margin-bottom: 3rem;
  }
  .article-card {
    border-bottom: 1px solid var(--pale); padding: 2.5rem 0;
    display: grid; grid-template-columns: 80px 1fr auto;
    gap: 2rem; align-items: start; cursor: pointer;
  }
  .article-card:hover .article-title { color: var(--accent); }
  .article-number {
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.1em; padding-top: 0.4rem; opacity: 0.6;
  }
  .article-title {
    font-size: clamp(1.3rem, 2.5vw, 1.8rem); font-weight: 400;
    line-height: 1.2; transition: color 0.2s; margin-bottom: 0.8rem;
  }
  .article-excerpt { font-size: 0.95rem; color: var(--sepia); line-height: 1.7; max-width: 520px; }
  .article-meta { text-align: right; }
  .article-date {
    display: block; font-family: var(--mono); font-size: 0.62rem;
    color: var(--muted); letter-spacing: 0.06em; white-space: nowrap;
    padding-top: 0.5rem; margin-bottom: 0.8rem;
  }
  .read-more {
    display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1rem;
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); transition: color 0.2s, gap 0.2s;
  }
  .article-card:hover .read-more { color: var(--accent); gap: 0.7rem; }
  .delete-btn {
    display: block; margin-top: 0.6rem; font-family: var(--mono); font-size: 0.6rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    background: none; border: 1px solid var(--pale); padding: 0.3rem 0.6rem;
    cursor: pointer; transition: all 0.2s;
  }
  .delete-btn:hover { color: var(--accent); border-color: var(--accent); }
  .article-full {
    display: none; max-width: 640px; margin: 0 auto; padding: 4rem 2rem 6rem;
    animation: fadeUp 0.5s ease both;
  }
  .article-full.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .back-btn {
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); cursor: pointer;
    border: none; background: none; padding: 0;
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 3rem; transition: color 0.2s;
  }
  .back-btn:hover { color: var(--accent); }
  .full-title {
    font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 300;
    line-height: 1.15; margin-bottom: 1.5rem;
  }
  .full-meta {
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.1em; margin-bottom: 2rem; padding-bottom: 2rem;
    border-bottom: 1px solid var(--pale);
  }
  .article-painting {
    width: 100%; margin: 0 0 3rem; border: 1px solid var(--pale);
  }
  .article-painting img { width: 100%; display: block; }
  .article-painting figcaption {
    font-family: var(--mono); font-size: 0.58rem; color: var(--muted);
    letter-spacing: 0.08em; padding: 0.7rem 0.8rem;
    border-top: 1px solid var(--pale); text-align: right; font-style: italic;
  }
  .full-body { font-size: 1.1rem; line-height: 1.85; color: #2c2418; }
  .full-body p { margin-bottom: 1.6rem; }
  .full-body em { font-style: italic; }
  .full-body blockquote {
    border-left: 2px solid var(--accent); padding-left: 1.5rem;
    margin: 2rem 0; font-style: italic; color: var(--sepia); font-size: 1.15rem;
  }
  .editor-panel {
    display: none; background: white; border: 1px solid var(--pale);
    border-radius: 2px; padding: 2.5rem; margin-bottom: 4rem;
    box-shadow: 0 4px 40px rgba(26,20,16,0.06); animation: fadeUp 0.4s ease both;
  }
  .editor-panel.active { display: block; }
  .editor-label {
    font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem;
  }
  .editor-panel input, .editor-panel textarea {
    width: 100%; border: none; border-bottom: 1px solid var(--pale);
    background: transparent; font-family: var(--serif); font-size: 1rem;
    color: var(--ink); padding: 0.6rem 0; margin-bottom: 1.2rem;
    outline: none; transition: border-color 0.2s;
  }
  .editor-panel input:focus, .editor-panel textarea:focus { border-bottom-color: var(--accent); }
  .editor-panel input::placeholder, .editor-panel textarea::placeholder { color: var(--muted); font-style: italic; }
  #editor-title { font-size: 1.6rem; font-weight: 300; }
  #editor-body { min-height: 200px; resize: vertical; line-height: 1.7; }
  .editor-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 0.5rem; }
  .btn {
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.7rem 1.5rem; cursor: pointer;
    border: none; transition: all 0.2s;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--accent); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--pale); }
  .btn-ghost:hover { color: var(--ink); border-color: var(--ink); }
  .pw-overlay {
    display: none; position: fixed; inset: 0; background: rgba(15,12,9,0.55);
    backdrop-filter: blur(6px); z-index: 500; align-items: center; justify-content: center;
  }
  .pw-overlay.open { display: flex; }
  .pw-box {
    background: var(--paper); border: 1px solid var(--pale); padding: 2.5rem; width: 320px;
    box-shadow: 0 8px 60px rgba(15,12,9,0.2); animation: fadeUp 0.3s ease both;
  }
  .pw-box label {
    font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 1rem;
  }
  .pw-box input {
    width: 100%; border: none; border-bottom: 1px solid var(--pale);
    background: transparent; font-family: var(--serif); font-size: 1.2rem;
    color: var(--ink); padding: 0.4rem 0; outline: none;
    letter-spacing: 0.15em; margin-bottom: 1.5rem;
  }
  .pw-box input:focus { border-bottom-color: var(--accent); }
  .pw-error {
    font-family: var(--mono); font-size: 0.6rem; color: var(--accent);
    margin-bottom: 1rem; display: none;
  }
  .pw-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
  footer {
    border-top: 1px solid var(--pale); padding: 2rem; text-align: center;
    font-family: var(--mono); font-size: 0.62rem; color: var(--accent);
    letter-spacing: 0.08em; font-style: italic;
  }
  @media (max-width: 640px) {
    .article-card { grid-template-columns: 1fr; gap: 0.5rem; }
    .article-number, .article-meta { display: none; }
  }
</style>
</head>
<body>

<div id="pw-overlay" class="pw-overlay" onclick="closePwIfOutside(event)">
  <div class="pw-box">
    <label>Accès éditeur</label>
    <input id="pw-input" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')checkPw(); if(event.key==='Escape')closePw();">
    <div id="pw-error" class="pw-error">Mot de passe incorrect.</div>
    <div class="pw-actions">
      <button class="btn btn-ghost" onclick="closePw()">Annuler</button>
      <button class="btn btn-primary" onclick="checkPw()">Entrer</button>
    </div>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="site-title" onclick="showList()">Carnets de <span>pensées</span></div>
    <nav><a onclick="showList()">Articles</a></nav>
  </div>
</header>

<div id="list-view">
  <main>
    <div id="editor-panel" class="editor-panel">
      <div class="editor-label">Nouvel article</div>
      <input id="editor-title" type="text" placeholder="Titre de votre pensée…">
      <input id="editor-excerpt" type="text" placeholder="Une phrase d'accroche…">
      <textarea id="editor-body" placeholder="Déposez ici vos réflexions…"></textarea>
      <div class="editor-actions">
        <button class="btn btn-ghost" onclick="toggleEditor()">Annuler</button>
        <button class="btn btn-primary" onclick="publishArticle()">Publier</button>
      </div>
    </div>
    <div class="section-label">Tous les articles</div>
    <div id="articles-grid"></div>
  </main>
</div>

<div id="article-view" class="article-full">
  <button class="back-btn" onclick="showList()">← Retour</button>
  <h1 id="article-title-full" class="full-title"></h1>
  <div id="article-meta-full" class="full-meta"></div>
  <figure id="article-painting" class="article-painting" style="display:none">
    <img id="article-painting-img" src="" alt="">
    <figcaption id="article-painting-caption"></figcaption>
  </figure>
  <div id="article-body-full" class="full-body"></div>
</div>

<footer>Léo Pellegrini</footer>

<script>
const SECRET = "1610";
let unlocked = false;

function openPw() {
  document.getElementById('pw-overlay').classList.add('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}
function closePw() { document.getElementById('pw-overlay').classList.remove('open'); }
function closePwIfOutside(e) { if (e.target.id === 'pw-overlay') closePw(); }
function checkPw() {
  if (document.getElementById('pw-input').value === SECRET) {
    unlocked = true; closePw(); toggleEditor(); renderArticles();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('keydown', e => {
  if (e.shiftKey && e.key === 'E') { unlocked ? toggleEditor() : openPw(); }
  if (e.key === 'Escape') {
    closePw();
    const p = document.getElementById('editor-panel');
    if (p.classList.contains('active')) toggleEditor();
  }
});

    id: 1,
    title: "Les États sont nietzschéens ou ils disparaissent",
    excerpt: "En 416 avant notre ère, les Athéniens détruisent Mélos. Thucydide, Nietzsche, et la vérité que les relations internationales n'ont jamais démentie : dans le système des États, la morale sans la force n'est qu'une pétition.",
    date: "13 mars 2026",
    image: VERONESE,
    imageCaption: "Paolo Véronèse, La Famille de Darius devant Alexandre, 1565–1567. National Gallery, Londres.",
    body: `En 416 avant notre ère, les émissaires athéniens se rendent sur l'île de Mélos pour en exiger la soumission. Les Méliens invoquent la justice, le droit des neutres, la morale des nations. Les Athéniens leur répondent avec une froideur absolue, restée célèbre dans l'histoire de la pensée politique : *"Les forts font ce qu'ils peuvent, les faibles subissent ce qu'ils doivent."* Mélos est détruite, ses hommes massacrés, ses femmes et enfants réduits en esclavage. Ce Dialogue des Méliens, rapporté par Thucydide dans *La Guerre du Péloponnèse* (Livre V, 416 av. J-C), constitue peut-être la démonstration la plus ancienne et la plus brutale d'une vérité que les relations internationales n'ont jamais véritablement démentie : dans le système des États, la morale sans la force n'est qu'une pétition.

Pourtant, le monde contemporain semble organisé autour d'une logique inverse. Des institutions internationales prolifèrent, un droit des nations se codifie, des organisations comme l'ONU ou la Cour Pénale Internationale prétendent arbitrer les conflits au nom de valeurs universelles. Deux logiques coexistent ainsi en tension permanente : d'un côté, les rapports de force bruts, les guerres, les expansions territoriales, l'unilatéralisme des grandes puissances ; de l'autre, le discours normatif, la condamnation morale, le recours aux institutions. Comment réconcilier ces deux réalités ? Et surtout : que nous dit cette tension sur la nature véritable du pouvoir entre les États ?

C'est en mobilisant la philosophie de Friedrich Nietzsche — et notamment sa généalogie de la morale — que cet essai propose une réponse. Non pour ériger Nietzsche en théoricien des relations internationales, ce qu'il n'est pas, mais parce que les mécanismes qu'il décrit à l'échelle de l'individu — la volonté de puissance, le ressentiment, la morale d'esclave — trouvent dans la politique internationale un terrain d'application saisissant. La question centrale est la suivante : dans quelle mesure la philosophie nietzschéenne permet-elle de lire les dynamiques de puissance entre États, et que nous dit-elle sur le déclin des nations qui font de la norme leur principale arme ?

Pour y répondre, nous établirons d'abord les fondements de la pensée nietzschéenne sur la morale et la puissance, avant de montrer comment ces mécanismes se transposent à l'échelle des États dans le système international, pour conclure sur les raisons structurelles pour lesquelles la norme seule, sans la force, aggrave le déclin plutôt qu'elle ne le conjure.

La morale est un ensemble de valeurs particulières, vouée à déterminer et influencer le comportement des hommes en définissant de grands principes jugés bons et d'autres jugés mauvais. C'est un système qui permet d'établir des principes de conduite et des limites à ceux-ci entre les hommes. La morale définit ainsi ce qui relève du bien, et ce qui n'en relève pas. Elle dicte les comportements des individus en instaurant un cadre social. Ainsi, la morale est subjective, elle n'émane en rien de quelconque élément immuable, naturel et universellement établi. C'est ce qu'affirme Nietzsche, qui va même plus loin. Selon le philosophe allemand, non seulement la morale est totalement subjective, mais elle est en plus le fruit d'un contexte historique et sociétal qui a poussé un groupe de personnes à instaurer cette morale en réponse à un problème. La morale est donc un outil pour Nietzsche, un instrument au service d'un groupe, car aucun des concepts qu'elle établit n'est figé : le bien et le mal dépendent uniquement de ceux qui les définissent. Nietzsche l'affirme avec une clarté radicale dans *Par-delà le bien et le mal* (1886) : *"Il n'y a pas de phénomènes moraux, il n'y a qu'une interprétation morale des phénomènes."* Cette phrase est le fondement de toute sa généalogie : les valeurs morales ne sont pas des vérités éternelles gravées dans l'ordre du monde, mais des constructions historiques issues de rapports de force. C'est précisément ce qu'il démontre dans *La Généalogie de la Morale* (1887), où il distingue d'emblée deux types de morales : la morale des maîtres, qui part d'une affirmation de soi ("je suis bon, donc ce qui me ressemble est bon"), et la morale des esclaves, qui part d'une négation de l'autre ("cet autre est mauvais, donc je suis bon par opposition"). Cette distinction est la clé de voûte de tout notre raisonnement.

Pour Nietzsche, le monde est le théâtre d'un affrontement des forces, et c'est de ce conflit que naît la hiérarchie. Le fragment DK 53 d'Héraclite proclame déjà : *"La guerre est le père de toutes choses, le roi de toutes choses"* (Polemos panton men pater esti). Nietzsche reprend cette intuition dans *La Philosophie à l'époque tragique des Grecs* (1873), où il salue Héraclite comme le penseur du devenir et du conflit structurant. Dans *Ainsi parlait Zarathoustra* (1883), il écrit : *"C'est la bonne guerre qui justifie toute cause."* L'affrontement n'est pas pour Nietzsche une tragédie à éviter, mais l'événement créateur de la hiérarchie entre les êtres — le catalyseur nécessaire pour distinguer et ordonner. De cet affrontement naissent deux types d'individus : les forts et les faibles. Les premiers agissent et s'affirment — ce que Gilles Deleuze, dans *Nietzsche et la philosophie* (1962), appelle la *force affirmative* — tandis que les seconds réagissent et dénoncent — la *force réactive*. Cette terminologie deleuzienne, fidèle à l'esprit nietzschéen, sera notre grille de lecture tout au long de cet essai.

Les forts sont ceux qui ont triomphé de l'affrontement, qui ont usé de leurs ressources et se sont battus en y mettant leur corps et leur âme. Les forts font preuve de ce que Nietzsche appelle la volonté de puissance. Il ne s'agit pas d'un simple désir de victoire. La volonté de puissance est une *pulsion fondamentale*, un *Trieb*, un principe ontologique qui traverse tout le vivant. Dans *Ainsi parlait Zarathoustra*, Nietzsche écrit : *"Où j'ai trouvé du vivant, j'ai trouvé la volonté de puissance."* C'est la pulsion de la plante qui pousse à travers le bitume craquelé pour atteindre la lumière, de l'animal blessé qui se traîne sur des kilomètres pour survivre. Et c'est cette même pulsion que Nietzsche évoque chez le fort : la volonté constante de s'affirmer, de créer, de s'étendre, animée par la volonté de vivre et de voir son être s'épanouir. L'incarnation humaine que Nietzsche lui-même convoque est significative : dans *La Généalogie de la Morale*, il cite Napoléon comme la figure par excellence de cette force affirmative, "cette synthèse du sur-humain et de l'inhumain". Le fort n'est pas celui qui gagne en permanence, mais celui qui ne cesse jamais de vouloir affirmer sa puissance, et qui accepte la défaite sans renoncer à cette pulsion.

Du conflit naissent aussi les faibles. Ceux-ci ont été vaincus, mais ils ne réagissent pas comme les forts. Leur défaite les confronte à leurs manquements, à leur incapacité à gagner par le combat. Ne sachant comment résister aux forts par le conflit tel qu'il existe, les faibles tombent dans le ressentiment : ce sentiment amer de la défaite et de l'infériorité qui fait progressivement détester celui qui triomphe et s'impose. Nietzsche décrit parfaitement ce mécanisme dans *La Généalogie de la Morale*, Première dissertation, §10 : *"La révolte des esclaves dans la morale commence quand le ressentiment lui-même devient créateur et engendre des valeurs : le ressentiment de ces êtres auxquels la véritable réaction, celle de l'acte, est interdite, et qui ne se dédommagent que par une vengeance imaginaire."* Ce ressentiment mène au nihilisme : cet état duquel rien n'est créé ni construit, rien ne s'affirme, mais duquel n'émane que la négation de l'autre, la critique, la justification et la dénonciation. C'est dans cette situation que naît la morale d'esclave. Elle devient un instrument, le moyen pour le faible de se départir du fort. Le bien réside désormais dans le soin accordé aux autres, la bienveillance, l'aide au faible, le respect d'autrui ; le mal résidant dans toute atteinte portée à autrui, quel qu'en soit la cause, et donc la domination induite qu'elle aurait engendré. La morale est donc pour Nietzsche le produit des faibles, une compensation à leur incapacité à triompher par le noble combat. C'est pourquoi il critique aussi vivement la morale chrétienne de son temps — qu'il décortique avec virulence dans *L'Antéchrist* (1888), où il voit le christianisme comme l'institutionnalisation parfaite de la morale d'esclave : la glorification de la faiblesse et de la souffrance érigées en vertus suprêmes.

Il faut ici introduire une nuance capitale, sans laquelle notre raisonnement risque d'être caricatural. La morale d'esclave et la protection juridique du faible ne sont pas condamnables en tant que telles au sein d'une société civile. Elles en sont au contraire la condition de pérennité. Hobbes le démontre dans *Le Léviathan* (1651) : sans contrat social, sans protection de l'individu faible par la loi, la société sombre dans la guerre de tous contre tous — et personne n'y gagne, pas même les forts. L'institutionnalisation de la protection du faible par le droit est ce qui rend possible une société stable, productive, et civilisée.

Maintenant, allons plus loin dans la réflexion. Les mécanismes décrits par Nietzsche à l'échelle de l'individu peuvent-ils s'appliquer aux États ? Cette transposition n'est pas arbitraire. Hegel, dans les *Principes de la philosophie du droit* (1820), pense déjà l'État comme une "individualité éthique", un individu collectif doté d'une volonté propre agissant sur la scène internationale. Plus récemment, Hans Morgenthau, dans *Politics Among Nations* (1948), pose que les États, comme les individus, sont animés par une *animus dominandi* — un désir de domination constitutif de la nature humaine transposée au niveau étatique. Considérons donc les États comme l'institutionnalisation de la volonté des individus en une entité politique gouvernante, quelle que soit leur nature : monarchie, dictature, autocratie, démocratie. À l'image de l'individu défendant ses intérêts en société, les États agissent dans le but de défendre leurs intérêts dans le système international. Le monde fonctionne en un sens comme une grande société, théâtre d'oppositions et de conflits, mais aussi d'alliances et d'ententes. Le conflit structurant les rapports de forces, les États peuvent donc être forts ou faibles au sens nietzschéen — et par conséquent, la morale d'esclave peut exister à l'échelle d'un État.

À l'image de l'individu, un État peut être fort et faire preuve de volonté de puissance. Celle-ci s'exprime par une volonté de créer, de s'affirmer sur la scène internationale en instiguant des discussions entre pays, en soutenant l'innovation et les nouvelles technologies, en poussant la recherche, en cherchant la prospérité et le développement économique et social. C'est aussi une discipline sociétale forte, une implication constante des individus, et une sensibilisation permanente à l'intérêt public. Un État fort est un État qui ne cesse de vouloir croître et affirmer son modèle, quitte à changer drastiquement de direction si celle-ci s'avère peu fructueuse. Il développe son soft power, capitalise sur sa culture, et développe conjointement son hard power, condition sine qua non à l'existence du premier. Cette volonté de puissance à l'échelle de l'État ne dépend pas de sa taille ou de sa richesse initiale — il s'agit d'un état d'esprit, d'une volonté, avant d'être un fait. Singapour en est l'illustration parfaite. En 1965, la cité-État est expulsée de la fédération malaisienne. Le pays ne possède aucune ressource naturelle, son PIB par habitant est inférieur à celui du Ghana. Pourtant, Lee Kuan Yew refuse l'aide internationale et construit une stratégie de puissance radicale : ouverture commerciale totale, investissement massif dans l'éducation, discipline sociale rigoureuse, attraction des capitaux étrangers. Singapour est aujourd'hui la quatrième place financière mondiale, avec l'un des PIB par habitant les plus élevés du globe. Lee Kuan Yew raconte lui-même cette trajectoire dans ses mémoires, *From Third World to First* (2000) — un récit qui est, en substance, une illustration de la volonté de puissance nietzschéenne appliquée à la gouvernance.

Un second exemple s'impose, plus massif encore : la Chine post-1978. Deng Xiaoping incarne la force affirmative dans sa version la plus pragmatique. Plutôt que de dénoncer l'ordre libéral occidental, il s'y intègre pour en extraire la puissance et fait donc changer drastiquement le pays de cap. Il crée les Zones Économiques Spéciales, ouvre le pays aux capitaux étrangers et résume sa philosophie d'une formule restée célèbre : *"Peu importe que le chat soit noir ou blanc, pourvu qu'il attrape les souris."* Aucune moralisation, aucun ressentiment — une volonté pure de croissance et d'affirmation. En quarante ans, la Chine est passée d'une économie agraire à la deuxième puissance mondiale.

À l'inverse, un État faible au sens nietzschéen n'agit pas, il réagit face aux situations auxquelles il est confronté. Sa politique et ses décisions apparaissent en réaction à celles des autres ; il n'est plus dans une dynamique de création. Son économie se maintient sur les rentes passées, ses investissements dans la recherche diminuent. L'État faible fait de plus en plus appel aux lois et à la législation en réaction au monde qui l'entoure. Il sombre dans la dénonciation, la critique des États qui le dépassent, et fait appel à ses valeurs morales pour juger du bien ou du mal des politiques des États concurrents. Finalement, l'État faible subit plus qu'il ne choisit son sort. L'Union Européenne offre ici un cas d'étude éclairant — non pas un État faible en soi, mais une entité qui illustre la logique réactive à grande échelle. Face à la montée des géants technologiques américains (GAFA) et chinois, la réponse européenne a été quasi exclusivement normative : RGPD, DSA, DMA, taxes numériques. Le résultat est éloquent : aucun champion technologique européen de premier rang n'a émergé de cette stratégie. La norme a remplacé la création. L'Europe légifère sur des plateformes qu'elle n'a pas su construire — c'est la définition même de la force réactive. La logique du ressentiment s'installe ainsi à l'échelle politique, imprégnant de la morale d'esclave les politiques internes et externes de l'État.

Je distingue trois forces réactives qui caractérisent la morale d'esclave à l'échelle de l'État, la première étant la moralisation internationale. L'État faible ne peut plus s'imposer sur la scène internationale ; il tombe dans le nihilisme et fait preuve de la morale d'esclave. Cette dernière ne lui sert qu'à condamner les forts qui agissent et croissent pour leurs propres intérêts, à fustiger et pointer du doigt ceux qui créent et menacent, par leur développement, la sécurité du faible. Ainsi, l'État faible fait appel à tout un vocabulaire moraliste pour critiquer les actions des États forts : respect des frontières, non-ingérence, voies diplomatiques, cadre international. Le Dialogue des Méliens constitue la démonstration la plus ancienne et la plus implacable de cette mécanique. Les Méliens invoquent la justice ; les Athéniens répondent par la force. La morale n'a pas sauvé Mélos. Cela ne signifie pas que la norme internationale est toujours impuissante — mais son efficacité dépend entièrement de la puissance qui la porte. La Guerre du Golfe de 1991 en est l'illustration parfaite : une résolution du Conseil de Sécurité de l'ONU autorise l'usage de la force contre l'Irak, et une coalition internationale libère le Koweït. En apparence, la norme et le droit international ont été respectés et mis en application avec succès. Cependant, cette résolution n'a été possible que parce qu'elle servait les intérêts géostratégiques et économiques des États-Unis et de ses alliés — sécuriser les approvisionnements pétroliers du Golfe, affirmer la prééminence américaine et occidentale dans l'ordre post-Guerre Froide, consolider des alliances régionales. La norme n'a pas produit l'action ; la puissance américaine a utilisé la norme comme habillage légitime de ses intérêts. C'est une distinction capitale : la norme peut être un instrument efficace entre les mains d'un État fort qui l'utilise stratégiquement — elle est vaine dans les mains d'un État faible qui n'a qu'elle. L'exemple contemporain qui illustre l'échec de la norme sans la puissance est la réaction occidentale à l'annexion de la Crimée en 2014. Une avalanche de condamnations morales, des résolutions à l'ONU, des sanctions économiques — et pourtant, la Crimée est toujours russe. L'analyste américain John Mearsheimer, dans son article *"Why the West is Responsible for the Ukrainian Crisis"* (Foreign Affairs, 2014), montre que la logique de puissance, ignorée par les Occidentaux au profit d'un discours normatif, a conduit à l'impasse. La norme sans force coercitive réelle n'a pas renversé le fait accompli militaire. Ainsi, lorsque le faible subit les velléités d'un État fort, la morale lui sert à tenter de discréditer les actions de la puissance dominante. Il ne s'agit pas de nier l'utilité du droit international en tant que tel — mais force est de constater que son usage devient central précisément quand il n'est plus adossé à la force qui lui donnerait les moyens de se passer d'explication. Invoqué sans puissance, il sert de compensation pour un État en déclin.

La deuxième force réactive que je perçois s'efforce de défendre vainement les intérêts économiques de l'État faible : il s'agit du protectionnisme économique. Mais ici, une distinction s'impose car le protectionnisme n'est pas par essence une force réactive — tout dépend de l'intention et du contexte qui le sous-tend. Il existe en effet deux formes de protectionnisme radicalement différentes. Le premier, que l'on peut qualifier de *protectionnisme offensif ou stratégique*, est le fait d'un État fort qui protège temporairement un secteur naissant pour lui donner le temps d'atteindre la maturité et la compétitivité internationale. C'est le modèle que l'économiste américain Alexander Hamilton théorisait dès 1791 dans son *Report on Manufactures*, et que les États-Unis ont appliqué tout au long du XIXe siècle pour développer leur industrie face à la concurrence britannique. C'est aussi le modèle coréen des années 1960-1970 sous Park Chung-hee : l'État protège et subventionne des conglomérats naissants — les chaebols comme Samsung et Hyundai — non pour préserver une rente existante, mais pour construire une puissance industrielle nouvelle. Ce protectionnisme-là est une expression de la volonté de puissance : il est temporaire, orienté vers la création, et disparaît une fois la compétitivité atteinte. Le second, le *protectionnisme défensif ou réactif*, est au contraire la marque de l'État faible au sens nietzschéen. Il ne vise pas à construire, mais à préserver une rente industrielle condamnée, à maintenir sous perfusion artificielle des secteurs qui ont cessé d'innover et ne peuvent plus rivaliser. L'industrie automobile européenne en est un exemple saisissant. Le rapport de 2023 du think tank européen Bruegel sur la compétitivité automobile fournit ici un diagnostic intéressant. Face à la montée en puissance de l'industrie automobile électrique chinoise, les stratégies des deux blocs révèlent deux logiques radicalement opposées — et illustrent parfaitement la distinction entre force affirmative et force réactive. L'Europe a construit sa transition automobile autour d'un procédé normatif : la réduction des émissions de CO2, avec l'interdiction des moteurs thermiques neufs à horizon 2035. C'est une logique réglementaire qui contraint les constructeurs à pivoter vers l'électrique, sans pour autant bâtir la chaîne industrielle et technologique nécessaire pour y être compétitifs — matériaux critiques, batteries, logiciels embarqués. La norme précède la puissance industrielle, au lieu d'en être la conséquence. La Chine, elle, a procédé dans l'ordre inverse. Pékin a déployé dès les années 2000 une politique industrielle offensive : subventions massives aux constructeurs nationaux (BYD, NIO, SAIC), protection du marché intérieur chinois rendu quasiment inaccessible aux constructeurs étrangers, investissements publics colossaux dans la chaîne des batteries lithium et des terres rares, et contrôle stratégique de l'amont minier en Afrique et en Amérique latine. Résultat : en 2023, la Chine est devenue le premier exportateur mondial de véhicules, toutes catégories confondues, dépassant le Japon. BYD a vendu plus de véhicules électriques que Tesla sur le marché mondial au dernier trimestre 2023. Ce n'est pas la norme qui a produit cette puissance — c'est une volonté politique délibérée de construction industrielle sur vingt ans après l'échec chinois dans la tentative de rattrapage des moteurs thermiques dans les années 1990. Face à ce constat, la réponse européenne a été — une fois de plus — normative et réactive : des droits de douane allant jusqu'à 45 % sur les véhicules électriques chinois, imposés en octobre 2024. La logique nietzschéenne s'applique tristement ici : l'Europe ne protège pas une industrie en construction, elle ralentit le déclin d'une industrie qui n'a pas su anticiper et maintient l'illusion que les tarifs douaniers sont garants de la pérennité du modèle. Ces droits de douane ne feront pas naître le prochain BYD européen — ils donneront simplement à Volkswagen et Stellantis quelques années de sursis supplémentaires, sans résoudre le problème de fond : un retard technologique structurel sur les batteries, les logiciels et les coûts de production. De plus, les conséquences du protectionnisme réactif sont systématiques : appauvrissement de la compétitivité dans la filière protégée, arrêt de l'innovation faute de concurrence, perte de savoir-faire, et consommateurs qui paient plus cher un produit moins performant qu'une alternative étrangère. Au lieu d'affirmer sa volonté de puissance par la création et l'innovation, l'État faible élude provisoirement le problème et en reporte les coûts sur les générations suivantes.

La troisième et dernière force réactive que je constate concerne l'usage du cadre législatif : l'inflation normative interne. Mécaniquement, la morale d'esclave s'exprime aussi par la législation et la création de lois visant à maintenir un système en déclin. Les chiffres parlent d'eux-mêmes. En France, le Code du travail comptait environ 600 pages en 1950 ; il en dépasse aujourd'hui 3 800. La France produit en moyenne 70 lois et 50 ordonnances par an. Le Conseil d'État lui-même, dans son rapport annuel de 2016 intitulé *"Simplification et qualité du droit"*, pointe cette "inflation normative" et ses effets délétères sur la compétitivité et la lisibilité du droit. Par contraste, le droit du travail singapourien tient en quelques dizaines de pages. L'opposition entre les forces réactives et affirmatives se lit aussi dans l'épaisseur d'un code. Montesquieu l'avait pressenti dans *De l'esprit des lois* (1748) : *"Les lois inutiles affaiblissent les lois nécessaires."* Il ne faut pas confondre l'inflation normative réactive avec la législation nécessaire à toute société organisée. Comme nous l'avons établi en première partie avec Hobbes, la loi est la condition du contrat social. Le problème n'est pas la loi en tant que telle, mais la loi produite en réaction au déclin plutôt qu'en soutien à la création. Il y a une différence fondamentale entre légiférer pour organiser et protéger — ce qui est le rôle naturel de l'État — et légiférer pour compenser une perte de compétitivité et de puissance que l'on n'a pas su anticiper. La première forme de législation accompagne la puissance, la seconde tente de masquer son absence. L'État n'agit plus — il adapte péniblement son cadre législatif pour préserver un équilibre que le monde a déjà dépassé. Ce sont les citoyens qui en paient les conséquences.

Hobbes nous enseigne que c'est précisément pour échapper à la guerre de tous contre tous que les hommes ont consenti à aliéner une part de leur liberté au profit du Léviathan — cette puissance souveraine qui impose la loi et protège le faible de la violence du fort. Au sein d'une société civile, l'individu faible survit donc non par sa propre force, mais parce qu'un tiers supérieur — l'État — détient le monopole de la violence légitime et lui garantit sa protection. La morale d'esclave a, en ce sens, triomphé : elle a réussi à inscrire dans la loi la protection de ceux qui ne pouvaient se défendre seuls. Je crois en le fait que ce triomphe est légitime, nécessaire, et constitutif de toute société pérenne. Mais ce Léviathan hobbesien n'existe pas à l'échelle internationale. Aucune puissance souveraine ne surplombe les États, aucun monopole de la violence légitime ne s'impose à tous. Le système international est précisément ce que Hobbes décrivait comme l'état de nature — un espace où chacun est seul juge de sa propre sécurité, et où la force reste l'arbitre ultime. Dans cet espace sans Léviathan, la réaction normative seule ne protège pas — elle expose.

Kenneth Waltz, dans *Theory of International Politics* (1979), pose comme prémisse absolue que le système international est *anarchique* par nature : il n'existe aucun souverain supérieur aux États, aucune autorité centrale capable d'imposer ses décisions à l'ensemble. Cette anarchie structurelle n'est pas une anomalie à corriger — c'est la condition permanente dans laquelle s'exercent les rapports de force entre États. C'est précisément ce qui rend la transposition nietzschéenne si pertinente : sans arbitre suprême, la morale ne peut être imposée, seulement invoquée. Des organes de gouvernance mondiale comme l'ONU ou la Cour Pénale Internationale tentent de jouer ce rôle d'arbitre. Mais leur effectivité dépend entièrement du rapport de forces entre leurs membres. La démonstration s'impose d'elle-même : la Russie bloque au Conseil de Sécurité toute résolution contraignante sur l'Ukraine. Les États-Unis n'ont jamais ratifié le Statut de Rome instituant la CPI. La Chine a ignoré sans conséquences l'arrêt de la Cour Permanente d'Arbitrage de 2016 sur ses revendications en mer de Chine méridionale. Ces trois exemples suffisent à montrer que les institutions internationales fonctionnent quand les puissances qui les composent y trouvent leur intérêt — et qu'elles deviennent lettre morte dès que ce n'est plus le cas. Jacques Attali, interrogé en commission d'enquête parlementaire au Sénat le 6 janvier 2026 sur la place de la France dans le nouvel ordre mondial, résumait cela avec précision : *"Il n'y a que de l'égoïsme rationnel, ou de l'altruisme intéressé."* Les traités fonctionnent ainsi : établis dans l'intérêt de leurs signataires, ils sont violés le jour où ils desservent l'une des parties. L'histoire en est le témoin le plus fidèle.

La norme et la morale n'ont pas de place autonome dans les relations internationales. Leur utilisation, seules, témoigne d'un manque de puissance et renforce la faiblesse et la crédulité de celui qui y recourt. Une puissance n'a pas besoin de se justifier — elle agit dans ses intérêts. Lorsque les États puissants utilisent le droit, c'est uniquement parce qu'il sert leurs intérêts.

À la différence de la société interpersonnelle des individus, le monde ne possède pas de juridiction suprême et n'est régi par aucune morale universellement contraignante. Par conséquent, l'attitude réactive qui caractérise la morale d'esclave aggrave le déclin de l'État sur la scène internationale. Les sanctions contre la Russie après l'invasion de l'Ukraine en 2022 n'ont-elles pas contraint un État fort ? L'objection mérite d'être prise au sérieux. Mais examinons les faits : le PIB russe a chuté d'environ 2 % en 2022, avant de se redresser à +3,6 % en 2023 selon les données du FMI. La Russie a pivoté vers la Chine, l'Inde et les pays du Golfe pour compenser les marchés occidentaux perdus. L'économie de guerre a partiellement absorbé le choc. Et surtout : la guerre continue, les territoires occupés le restent. Ce qui a eu le plus d'effet tangible sur le terrain n'est pas la condamnation normative, mais la livraison d'armes — c'est-à-dire une réponse en termes de force, non de norme. Seule la puissance contraint la puissance. La sanction morale sans capacité coercitive réelle s'est révélée insuffisante à renverser la volonté de puissance d'un État déterminé.

La distinction que je défends ici n'est donc pas : norme utile contre norme inutile. C'est : norme adossée à la puissance contre norme substituée à la puissance. La première peut être redoutablement efficace — c'est l'outil du fort qui l'utilise à son avantage. La seconde est non seulement inefficace, mais contre-productive, car elle occupe le champ de l'action sans en produire les résultats, et donne l'illusion d'agir là où il faudrait construire. C'est en ce sens précis que la norme seule est un accélérateur de déclin dans le système international.

Raymond Aron, dans *Paix et Guerre entre les Nations* (1962), écrit que le diplomate et le soldat sont les deux figures irréductibles de la politique internationale. La norme sans la force est vaine, la force sans la norme est aveugle. Mais dans l'ordre de la construction de la puissance, c'est toujours la force qui précède la norme — jamais l'inverse. Les États-Unis n'ont pas bâti l'ordre libéral d'après-guerre parce qu'ils croyaient dans les institutions ; ils ont construit ces institutions parce qu'ils avaient la puissance hégémonique de le faire, et que cet ordre servait leurs intérêts.

Ainsi, dans un monde international sans arbitre suprême, régi par la *realpolitik*, la puissance ne naît pas de la norme. La morale ne protège pas ceux qui ont renoncé à l'affirmation. Et la norme seule, sans la force qui lui accorde sa crédibilité, n'est pas un bouclier — c'est un accélérateur de déclin.

Finalement, les États sont nietzschéens — ou ils disparaissent.`
  }
];

let articles = [...ARTICLES];

function parseText(t) {
  t = t.replace(/\*\*(.+?)\*\*/g, '$1');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return t;
}

function deleteArticle(id, e) {
  e.stopPropagation();
  if (!confirm('Supprimer cet article ?')) return;
  articles = articles.filter(a => a.id !== id);
  renderArticles();
}

function renderArticles() {
  const grid = document.getElementById('articles-grid');
  grid.innerHTML = '';
  if (!articles.length) {
    grid.innerHTML = '<p style="color:var(--muted);font-style:italic;padding:2rem 0;">Aucun article pour l\'instant.</p>';
    return;
  }
  articles.slice().reverse().forEach((a, i) => {
    const el = document.createElement('div');
    el.className = 'article-card';
    const delBtn = unlocked
      ? `<button class="delete-btn" onclick="deleteArticle(${a.id}, event)">Supprimer</button>`
      : '';
    el.innerHTML = `
      <div class="article-number">0${articles.length - i}</div>
      <div>
        <h2 class="article-title">${a.title}</h2>
        <p class="article-excerpt">${a.excerpt}</p>
        <span class="read-more">Lire →</span>
      </div>
      <div class="article-meta">
        <span class="article-date">${a.date}</span>
        ${delBtn}
      </div>
    `;
    el.onclick = () => showArticle(a.id);
    grid.appendChild(el);
  });
}

function showArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  document.getElementById('article-title-full').textContent = a.title;
  document.getElementById('article-meta-full').textContent = a.date;

  const painting = document.getElementById('article-painting');
  if (a.image) {
    document.getElementById('article-painting-img').src = a.image;
    document.getElementById('article-painting-img').alt = a.imageCaption || '';
    document.getElementById('article-painting-caption').textContent = a.imageCaption || '';
    painting.style.display = 'block';
  } else {
    painting.style.display = 'none';
  }

  const html = a.body.split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<blockquote>')) return parseText(p);
    return `<p>${parseText(p)}</p>`;
  }).join('');
  document.getElementById('article-body-full').innerHTML = html;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('article-view').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('article-view').classList.remove('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleEditor() {
  const panel = document.getElementById('editor-panel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) {
    document.getElementById('editor-title').focus();
    panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function publishArticle() {
  const title = document.getElementById('editor-title').value.trim();
  const excerpt = document.getElementById('editor-excerpt').value.trim();
  const body = document.getElementById('editor-body').value.trim();
  if (!title || !body) { alert('Titre et contenu requis.'); return; }
  const date = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  articles.push({ id: Date.now(), title, excerpt: excerpt || body.slice(0, 100) + '…', date, body });
  renderArticles();
  ['editor-title', 'editor-excerpt', 'editor-body'].forEach(id => document.getElementById(id).value = '');
  toggleEditor();
}

renderArticles();
</script>
